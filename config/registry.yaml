# Assumption registry — the single source of inputs for the engine.
# Constitution Principle II: every input lives here, exactly once.
# Constitution Principle III: every entry carries an `origin` tag.
#
# Origin values:
#   measured-from-data | disclosed | observed | assumed

dataset:
  seed:
    value: 20260101
    origin: assumed
    notes: "Fixed seed for deterministic synthetic data (SC-007)."
  weeks:
    value: 26
    origin: assumed
  start_date:
    value: 2025-11-03
    origin: assumed
    notes: "Monday of week 0; chosen so ab.split_date (2026-02-02) lands mid-history."
  seasonality_amplitude:
    value: 0.2
    origin: assumed
    notes: "±20% weekly seasonality (sin curve over the year)."
  partner_volumes:
    value:
      bank_portal: 3000
      regional_carrier: 600
      budget_carrier: 2000
    origin: assumed
    notes: "Average bookings per week per partner of each type (research §5 / spec assumptions)."
  fare_mean_cents:
    value:
      domestic: 8000
      short-haul intl: 18000
      long-haul intl: 55000
    origin: assumed
    notes: "Mean fare in EUR cents per route type."
  fare_sigma_cents:
    value:
      domestic: 2000
      short-haul intl: 5000
      long-haul intl: 18000
    origin: assumed
  baseline_attach_rate:
    value:
      bank_portal: 0.18
      regional_carrier: 0.12
      budget_carrier: 0.25
    origin: assumed
  baseline_realised_cancel_rate:
    value:
      bank_portal: 0.038
      regional_carrier_a: 0.058
      budget_carrier: 0.060
    origin: assumed
    notes: "Where realised > priced, the gap seeds the structural-vs-event-driven story."

coverage_pct:
  value: 0.85
  origin: disclosed
  source: "DA Product T&Cs §3.2 (signed 2025-09-01)"
  notes: "Coverage applies to fare excluding taxes."

